<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Three.js Head Tracking with Video + SSAO + Overlay</title>
<style>
body { margin:0; background:#111; overflow:hidden; }

/* Video background */
#videoContainer {
  position: absolute;
  top: 0; left: 0;
  width: 150px; height: 150px;
  z-index: 0;
  overflow: hidden;
}
#videoElement {
  width: 100%; height: 100%;
  object-fit: cover;
}

/* Three.js canvas */
#viewer {
  position: absolute;
  top: 0; left: 0;
  width: 150px; height: 150px;
  z-index: 1;
  pointer-events: none;
}

/* PNG overlay border */
#overlayBorder {
  position: absolute;
  top: 0; left: 0;
  width: 150px; height: 150px;
  z-index: 2;             /* On top of video and canvas */
  pointer-events: none;   /* So it doesn't block mouse input */
}
</style>
</head>
<body>

<div id="videoContainer">
  <video id="videoElement" playsinline autoplay muted loop>
    <source src="new.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<div id="viewer"></div>

<!-- PNG overlay -->
<img id="overlayBorder" src="border.PNG" />

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.module.js",
    "three/examples/jsm/loaders/GLTFLoader.js": "https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/loaders/GLTFLoader.js",
    "three/examples/jsm/postprocessing/EffectComposer.js": "https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/postprocessing/EffectComposer.js",
    "three/examples/jsm/postprocessing/RenderPass.js": "https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/postprocessing/RenderPass.js",
    "three/examples/jsm/postprocessing/SSAOPass.js": "https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/postprocessing/SSAOPass.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
import { SSAOPass } from 'three/examples/jsm/postprocessing/SSAOPass.js';

const container = document.getElementById("viewer");
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 100);

// Lights
const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6); 
directionalLight.position.set(3,5,2);
scene.add(directionalLight);
scene.add(new THREE.AmbientLight(0xffffff, 1));
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const ssaoPass = new SSAOPass(scene, camera, container.clientWidth, container.clientHeight);
ssaoPass.kernelRadius = 1;
ssaoPass.minDistance = 0.001;
ssaoPass.maxDistance = 0.03;
composer.addPass(ssaoPass);

// Mouse tracking
let mouse = new THREE.Vector2(0,0);
document.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

// Load model
const loader = new GLTFLoader();
let model, headBone, mixer;

loader.load('./IdleLowPoly2.glb', gltf => {
    model = gltf.scene;
    model.traverse(c => {
      if(c.isMesh)
        c.material = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.7, metalness:0 });
    });

    const box = new THREE.Box3().setFromObject(model);
    const size = new THREE.Vector3();
    box.getSize(size);
    model.scale.setScalar(6 / size.y);

    scene.add(model);

    const topY = 27.5;
    const frontZ = 10;
    camera.position.set(0, topY-0.3, frontZ);
    camera.lookAt(0, topY, 0);

    headBone = model.getObjectByName("LowManHead");
    if(!headBone) console.warn("Head bone/mesh not found!");

    if(gltf.animations && gltf.animations.length>0){
        mixer = new THREE.AnimationMixer(model);
        const idleAction = mixer.clipAction(gltf.animations[0]);
        idleAction.play();
        console.log(`Playing animation: ${gltf.animations[0].name}`);
    }

}, xhr => console.log(`Loading: ${(xhr.loaded/xhr.total*100).toFixed(0)}%`),
err => console.error('Error loading GLB:', err)
);

const clock = new THREE.Clock();

function animate() {
    const delta = clock.getDelta();
    if(mixer) mixer.update(delta);

    if(headBone){
        const MOUSE_MULTIPLIER = 20;
        const target = new THREE.Vector3(mouse.x*MOUSE_MULTIPLIER, mouse.y*MOUSE_MULTIPLIER, 0.5);
        target.unproject(camera);

        const quat = new THREE.Quaternion();
        headBone.lookAt(target);
        quat.copy(headBone.quaternion);
        headBone.quaternion.slerp(quat, 0.1);
    }

    composer.render();
    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
